services:
  mongo:
    image: mongo:7
    container_name: kandora-tnt-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - kandora-network

  redis:
    image: redis:7-alpine
    container_name: kandora-tnt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kandora-network

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  kandora-network:
    driver: bridge
